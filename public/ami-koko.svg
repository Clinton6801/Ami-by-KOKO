<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
<defs>
  <radialGradient id="bg" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#FDE68A"/>
    <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C68642"/>
    <stop offset="100%" stop-color="#A0522D"/>
  </linearGradient>
  <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#16A34A"/>
    <stop offset="100%" stop-color="#14532D"/>
  </linearGradient>
  <linearGradient id="parrot" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#4ADE80"/>
    <stop offset="100%" stop-color="#16A34A"/>
  </linearGradient>
</defs>

<!-- Background circle -->
<circle cx="200" cy="270" r="195" fill="#FEF3C7"/>
<circle cx="200" cy="270" r="195" fill="url(#bg)"/>

<!-- Sparkles -->
