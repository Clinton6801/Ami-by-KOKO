<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Àmì by Kòkò — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FEFCE8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .illustration {
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1C1917;
      margin-bottom: 12px;
    }
    p {
      color: #78716C;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 8px;
    }
    .koko {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .retry {
      margin-top: 24px;
      background: #F59E0B;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry:hover { background: #D97706; }
  </style>
</head>
<body>
  <div class="koko">🦜</div>
  <img src="/ami-koko.svg" alt="Àmì and Kòkò" class="illustration" onerror="this.style.display='none'" />
  <h1>Kòkò is waiting for the internet!</h1>
  <p>It looks like you're offline right now.</p>
  <p>You can still practice letters you've already learned — they're saved on your device!</p>
  <button class="retry" onclick="window.location.reload()">
    🔄 Try again
  </button>
</body>
</html>
